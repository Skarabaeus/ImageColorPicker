<!doctype html>
<html>
  <head>
    <title>Test Template</title>
		<script src="../src/ImageColorPicker.js" type="text/javascript"></script>
		<script type="text/javascript">
      window.addEventListener("DOMContentLoaded", function() {
        var img1 = document.getElementById("test");
        var img2 = document.getElementById("test2");

        new ImageColorPicker(img1, {
          afterColorSelected: function(color) {
            document.getElementById("result_test").textContent = color;
          }
        });

        new ImageColorPicker(img2, {
          afterColorSelected: function(color) {
            document.getElementById("result_test2").textContent = color;
          }
        });
      });
		</script>
		<!-- reset CSS -->
		<link rel="stylesheet" href="http://yui.yahooapis.com/2.8.1/build/reset/reset-min.css" type="text/css" media="screen" charset="utf-8"/>
		<link rel="stylesheet" href="../dist/ImageColorPicker.css" type="text/css" media="screen" charset="utf-8"/>
		<style type="text/css">

		</style>
  </head>
  <body>
	<table>
    <tr>
        <td>
        	<img src="test.png" alt="" id="test" />
        	<div id="result_test"></div>
        </td>
        <td>
        	<img src="test2.jpg" alt="" id="test2" />
        	<div id="result_test2"></div>
        </td>
    </tr>
    
    
  </table>
  </body>
</html>
